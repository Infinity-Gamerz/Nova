<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6aac;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --glow: rgba(124, 106, 255, 0.3);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  /* ── GRADIENT MESH ── */
  .mesh {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.15;
  }
  .mesh-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; animation: drift1 12s ease-in-out infinite; }
  .mesh-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation: drift2 15s ease-in-out infinite; }
  .mesh-3 { width: 300px; height: 300px; background: #6affdc; top: 40%; left: 50%; animation: drift3 18s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
  @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-40%,-60%)} }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .page.active { display: flex; flex-direction: column; }

  /* ── HOME PAGE ── */
  #home {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    text-align: center;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), #6affdc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    color: var(--muted);
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  /* ── SEARCH BOX ── */
  .search-wrap {
    width: 100%;
    max-width: 640px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .search-box {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 0 1.25rem;
    gap: 0.75rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 var(--glow);
  }

  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--glow), 0 8px 40px rgba(0,0,0,0.4);
  }

  .search-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
    color: var(--muted);
    transition: color 0.2s;
  }

  .search-box:focus-within .search-icon { color: var(--accent); }

  #main-input, #results-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(1rem, 3vw, 1.15rem);
    font-weight: 400;
    color: var(--text);
    padding: 1.1rem 0;
    caret-color: var(--accent);
  }

  #main-input::placeholder, #results-input::placeholder { color: var(--muted); }

  .search-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 0.55rem 1.1rem;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .search-btn:hover { opacity: 0.85; transform: scale(1.03); }
  .search-btn:active { transform: scale(0.97); }

  /* ── QUICK LINKS ── */
  .quick-links {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 0.6s 0.3s ease both;
    max-width: 640px;
    width: 100%;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.45rem 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,255,0.08);
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0.25rem;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .tab {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }

  .tab.active, .tab:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,255,0.1);
  }

  /* ── RESULTS PAGE ── */
  #results { padding: 0; }

  .results-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0.4rem;
    border-radius: 8px;
    display: flex;
    align-items: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .back-btn:hover { color: var(--accent); background: rgba(124,106,255,0.1); }

  .results-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    flex-shrink: 0;
    display: none;
  }

  @media (min-width: 600px) { .results-logo { display: block; } }

  .results-search-wrap {
    flex: 1;
    max-width: 600px;
  }

  .results-search-wrap .search-box { border-radius: 12px; padding: 0 1rem; }
  .results-search-wrap #results-input { padding: 0.75rem 0; font-size: 0.95rem; }
  .results-search-wrap .search-btn { padding: 0.45rem 0.9rem; font-size: 0.8rem; }

  .results-tabs {
    display: flex;
    gap: 0;
    padding: 0 1.5rem;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .results-tabs::-webkit-scrollbar { display: none; }

  .results-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 0.75rem 1rem;
    font-size: 0.83rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    margin-bottom: -1px;
  }

  .results-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .results-tab:hover { color: var(--text); }

  .results-body {
    padding: 1.5rem;
    max-width: 760px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .meta-line {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    font-weight: 300;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.4s ease both;
    text-decoration: none;
    display: block;
  }

  .result-card:hover {
    border-color: rgba(124,106,255,0.5);
    background: var(--surface2);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,106,255,0.15);
  }

  .result-site {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.35rem;
  }

  .favicon {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    font-family: 'Syne', sans-serif;
  }

  .result-domain {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
  }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(0.95rem, 2.5vw, 1.05rem);
    font-weight: 600;
    color: #a89eff;
    margin-bottom: 0.4rem;
    line-height: 1.3;
    transition: color 0.2s;
  }

  .result-card:hover .result-title { color: var(--accent2); }

  .result-snippet {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 300;
  }

  .result-snippet mark {
    background: none;
    color: var(--text);
    font-weight: 500;
  }

  /* ── FEATURED BOX ── */
  .featured {
    background: linear-gradient(135deg, rgba(124,106,255,0.12), rgba(255,106,172,0.08));
    border: 1px solid rgba(124,106,255,0.3);
    border-radius: 18px;
    padding: 1.3rem 1.5rem;
    margin-bottom: 0.25rem;
    animation: fadeUp 0.3s ease both;
  }

  .featured-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.5rem;
  }

  .featured-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
  }

  .featured-text {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.65;
    font-weight: 300;
  }

  /* ── EMPTY / LOADING ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .no-results {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--muted);
  }

  .no-results h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  /* ── SETTINGS / FOOTER ── */
  .home-footer {
    position: absolute;
    bottom: 1.5rem;
    display: flex;
    gap: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .home-footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .home-footer a:hover { color: var(--accent); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── MOBILE TWEAKS ── */
  @media (max-width: 480px) {
    .results-header { padding: 0.75rem 1rem; gap: 0.5rem; }
    .results-body { padding: 1rem; }
    .results-tabs { padding: 0 1rem; }
    .home-footer { gap: 1rem; }
  }
</style>
</head>
<body>

<div class="mesh mesh-1"></div>
<div class="mesh mesh-2"></div>
<div class="mesh mesh-3"></div>

<!-- ───── HOME PAGE ───── -->
<div id="home" class="page active">
  <div class="logo-wrap">
    <div class="logo">Nova</div>
    <div class="tagline">Search the infinite web</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="main-input" type="search" placeholder="Ask anything, search anywhere…" autocomplete="off" spellcheck="false">
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active">All</button>
    <button class="tab">Images</button>
    <button class="tab">News</button>
    <button class="tab">Videos</button>
  </div>

  <div class="quick-links">
    <div class="chip" onclick="quickSearch('Claude AI')">🤖 Claude AI</div>
    <div class="chip" onclick="quickSearch('latest news today')">📰 Today's News</div>
    <div class="chip" onclick="quickSearch('weather forecast')">🌤 Weather</div>
    <div class="chip" onclick="quickSearch('best movies 2025')">🎬 Movies</div>
    <div class="chip" onclick="quickSearch('programming tutorial')">💻 Coding</div>
    <div class="chip" onclick="quickSearch('healthy recipes')">🥗 Recipes</div>
  </div>

  <div class="home-footer">
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">About Nova</a>
  </div>
</div>

<!-- ───── RESULTS PAGE ───── -->
<div id="results" class="page">
  <div class="results-header">
    <button class="back-btn" onclick="goHome()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <div class="results-logo">Nova</div>
    <div class="results-search-wrap">
      <div class="search-box">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="results-input" type="search" placeholder="Search…" autocomplete="off" spellcheck="false">
        <button class="search-btn" onclick="doSearch()">Go</button>
      </div>
    </div>
  </div>

  <div class="results-tabs">
    <button class="results-tab active">All</button>
    <button class="results-tab">Images</button>
    <button class="results-tab">News</button>
    <button class="results-tab">Videos</button>
    <button class="results-tab">Maps</button>
    <button class="results-tab">More</button>
  </div>

  <div class="results-body" id="results-body">
    <!-- injected by JS -->
  </div>
</div>

<script>
/* ── DATA: mock search results ── */
const DB = {
  "claude ai": {
    featured: { title: "Claude — Anthropic's AI Assistant", text: "Claude is an AI assistant made by Anthropic, designed to be helpful, harmless, and honest. Available at claude.ai for chat, coding, writing, analysis, and much more." },
    results: [
      { domain:"claude.ai", title:"Claude — Chat with an AI Assistant", snippet:"Claude is an <mark>AI</mark> assistant made by <mark>Anthropic</mark>. Sign in to access Claude Sonnet, Opus, and Haiku for free and Pro plans." },
      { domain:"anthropic.com", title:"Anthropic — AI Safety Company", snippet:"Anthropic is an <mark>AI safety</mark> company working to build reliable, interpretable, and steerable AI systems. Creators of the <mark>Claude</mark> model family." },
      { domain:"en.wikipedia.org", title:"Claude (language model) — Wikipedia", snippet:"Claude is a family of large language models developed by <mark>Anthropic</mark>. The latest generation, Claude 4, includes Opus 4 and Sonnet 4 variants." },
    ]
  },
  "latest news today": {
    results: [
      { domain:"bbc.com/news", title:"BBC News — Breaking News, World & UK News", snippet:"Follow <mark>today's latest news</mark> and breaking stories from around the world on BBC News. Updated every minute." },
      { domain:"reuters.com", title:"Reuters — World News & Breaking Stories", snippet:"Trusted <mark>news</mark> source for the world. Reuters covers international, business, tech, sports, and entertainment stories <mark>today</mark>." },
      { domain:"apnews.com", title:"AP News — The Definitive Source", snippet:"The Associated Press delivers <mark>today's latest</mark> headlines covering politics, science, sports, and culture from a globally trusted outlet." },
    ]
  },
  "weather forecast": {
    featured: { title: "Weather Forecast", text: "Enable location access in your browser to get a real-time local weather forecast. Current global average surface temperature remains about 1.3°C above pre-industrial levels." },
    results: [
      { domain:"weather.com", title:"The Weather Channel — Forecasts & Maps", snippet:"Get your <mark>weather forecast</mark> from The Weather Channel: hourly, 10-day, and radar maps for any location worldwide." },
      { domain:"weather.gov", title:"National Weather Service — Official Forecasts", snippet:"NOAA's National Weather Service provides <mark>forecasts</mark>, warnings, and climate data for the United States." },
    ]
  },
  "programming tutorial": {
    results: [
      { domain:"developer.mozilla.org", title:"MDN Web Docs — Web Technology Tutorials", snippet:"The best reference for web <mark>programming tutorials</mark>. Covers HTML, CSS, JavaScript, APIs, and more with interactive examples." },
      { domain:"freecodecamp.org", title:"freeCodeCamp — Learn to Code for Free", snippet:"Free interactive <mark>coding tutorials</mark> covering web dev, Python, data science, machine learning, and more. 9,000+ hours of curriculum." },
      { domain:"codecademy.com", title:"Codecademy — Online Coding Courses", snippet:"Interactive <mark>programming</mark> courses for beginners and pros. Python, JavaScript, SQL, React, and dozens more languages." },
    ]
  },
  "best movies 2025": {
    featured: { title: "Top Movies of 2025", text: "Highlights include several critically acclaimed releases across action, drama, and animation. Check streaming platforms for availability." },
    results: [
      { domain:"rottentomatoes.com", title:"Best Movies of 2025 — Rotten Tomatoes", snippet:"Critics' picks for the <mark>best films of 2025</mark>. Tomatometer scores, audience ratings, and where to watch each title." },
      { domain:"imdb.com", title:"IMDb — Top 2025 Movies", snippet:"Browse <mark>2025's highest-rated</mark> movies on IMDb. Filter by genre, rating, box office, and streaming availability." },
    ]
  },
  "healthy recipes": {
    results: [
      { domain:"bbcgoodfood.com", title:"BBC Good Food — Healthy Recipes & Meal Ideas", snippet:"Discover thousands of <mark>healthy recipes</mark> rated by home cooks. Breakfast, lunch, dinner, and snack ideas with nutrition info." },
      { domain:"allrecipes.com", title:"Allrecipes — Food, Friends & Recipe Inspiration", snippet:"Find the best <mark>healthy recipes</mark> with ratings, reviews, and photos from home cooks. Filter by diet, cuisine, and prep time." },
      { domain:"eatingwell.com", title:"EatingWell — Healthy Recipes & Nutrition Advice", snippet:"Expert-tested <mark>healthy recipes</mark> and diet tips from registered dietitians. Focus on whole foods and balanced nutrition." },
    ]
  }
};

function getResults(q) {
  const key = q.toLowerCase().trim();
  for (const k in DB) {
    if (key.includes(k) || k.includes(key)) return DB[k];
  }
  // Generic fallback
  const words = q.split(" ").filter(w => w.length > 2);
  return {
    results: [
      { domain: "google.com", title: `${q} — Google Search`, snippet: `Search Google for <mark>${q}</mark> to find the most relevant web pages, images, videos, and more.` },
      { domain: "wikipedia.org", title: `${q} — Wikipedia`, snippet: `Wikipedia article about <mark>${q}</mark>. Read background, history, references, and related topics on the free encyclopedia.` },
      { domain: "reddit.com", title: `${q} Discussion — Reddit`, snippet: `Join the Reddit community discussing <mark>${q}</mark>. Find threads, opinions, and expert advice from real users.` },
      { domain: "youtube.com", title: `${q} Videos — YouTube`, snippet: `Watch videos about <mark>${q}</mark> on YouTube. Tutorials, reviews, vlogs, and more from creators worldwide.` },
    ]
  };
}

/* ── NAV ── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showPage('home');
  document.getElementById('main-input').value = '';
}

function doSearch() {
  const onHome = document.getElementById('home').classList.contains('active');
  const q = onHome
    ? document.getElementById('main-input').value.trim()
    : document.getElementById('results-input').value.trim();
  if (!q) return;
  renderResults(q);
}

function quickSearch(q) {
  document.getElementById('main-input').value = q;
  renderResults(q);
}

function renderResults(q) {
  document.getElementById('results-input').value = q;
  showPage('results');

  const body = document.getElementById('results-body');
  body.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>Searching…</span></div>`;

  setTimeout(() => {
    const data = getResults(q);
    let html = `<div class="meta-line">About ${(Math.random()*900+100).toFixed(0)},000,000 results (${(Math.random()*0.4+0.3).toFixed(2)} seconds)</div>`;

    if (data.featured) {
      html += `<div class="featured">
        <div class="featured-label">✦ Featured snippet</div>
        <div class="featured-title">${data.featured.title}</div>
        <div class="featured-text">${data.featured.text}</div>
      </div>`;
    }

    data.results.forEach((r, i) => {
      const initial = r.domain[0].toUpperCase();
      const delay = i * 0.06;
      html += `<a class="result-card" href="https://${r.domain}" target="_blank" rel="noopener" style="animation-delay:${delay}s">
        <div class="result-site">
          <div class="favicon">${initial}</div>
          <span class="result-domain">${r.domain}</span>
        </div>
        <div class="result-title">${r.title}</div>
        <div class="result-snippet">${r.snippet}</div>
      </a>`;
    });

    body.innerHTML = html;
  }, 500);
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const onHome = document.getElementById('home').classList.contains('active');
    const active = document.activeElement;
    if ((onHome && active.id === 'main-input') || (!onHome && active.id === 'results-input')) {
      doSearch();
    }
  }
  if (e.key === 'Escape') {
    const onHome = document.getElementById('home').classList.contains('active');
    if (!onHome) goHome();
  }
});

/* ── TAB ACTIVE STATE (home) ── */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});

/* ── TAB ACTIVE STATE (results) ── */
document.querySelectorAll('.results-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.results-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});
</script>
</body>
</html>
